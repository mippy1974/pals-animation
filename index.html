<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P.A.L.S. | How It Works</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FDF6EC;
    --turq:#56DEE2;
    --teal:#17777B;
    --orange:#F5821F;
    --peach:#FDE4D0;
    --ink:#1E2528;
    --line:#22282B;
    --sans:"Nunito",-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:#F3EADB;font-family:var(--sans);color:var(--ink);
    display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;
  }
  .frame{
    width:min(960px,100%);background:var(--cream);border-radius:18px;overflow:hidden;
    box-shadow:0 18px 50px rgba(23,119,123,.22);
  }
  .topbar{height:10px;background:linear-gradient(90deg,var(--turq) 0 78%,var(--orange) 78% 100%)}
  header{display:flex;justify-content:space-between;align-items:center;padding:16px 28px 4px}
  .wordmark{font-weight:900;font-size:30px;letter-spacing:.03em;color:var(--orange)}
  .subname{font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase}
  .org{font-size:12px;font-weight:800;color:var(--teal)}
  svg{display:block;width:100%;height:auto}

  .caption{padding:2px 28px 10px;min-height:104px}
  .eyebrow{font-size:11px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;color:var(--orange);margin-bottom:4px;transition:opacity .45s}
  .step-title{font-weight:900;font-size:25px;color:var(--teal);margin-bottom:4px;transition:opacity .45s}
  .step-copy{font-size:14.5px;font-weight:600;line-height:1.5;color:#4A555A;max-width:660px;transition:opacity .45s}
  .caption.fading .eyebrow,.caption.fading .step-title,.caption.fading .step-copy{opacity:0}

  .progress{display:flex;gap:8px;padding:0 28px 14px}
  .bar{flex:1;height:5px;border-radius:3px;background:#EADDC8;overflow:hidden}
  .bar i{display:block;height:100%;width:0;background:var(--turq);border-radius:3px}
  .bar.active i{animation:fill linear forwards}
  .bar.done i{width:100%;background:var(--teal)}
  @keyframes fill{from{width:0}to{width:100%}}

  footer{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;padding:12px 28px 18px;background:var(--teal)}
  .pills{display:flex;gap:8px;flex-wrap:wrap}
  .pill{font-size:11px;font-weight:800;color:#EFFBFA;border:1.5px solid rgba(255,255,255,.55);border-radius:999px;padding:4px 12px}
  .tagline{font-weight:900;font-size:15px;color:#FFF}
  .tagline b{color:var(--turq)}

  /* ============ always-on ambient motion ============ */
  .draw{stroke-dasharray:1;stroke-dashoffset:1;transition:stroke-dashoffset 1.6s ease}
  .stage.drawn .draw{stroke-dashoffset:0}

  .ripple{opacity:0;transform-origin:480px 58px;animation:ripple 3.4s ease-out infinite}
  .ripple.r2{animation-delay:1.1s}
  .ripple.r3{animation-delay:2.2s}
  @keyframes ripple{0%{opacity:.75;transform:scale(.12)}100%{opacity:0;transform:scale(1)}}

  #cat-tail{transform-origin:300px 374px;animation:flick 3.2s ease-in-out infinite}
  @keyframes flick{0%,55%,100%{transform:rotate(0deg)}65%{transform:rotate(-18deg)}75%{transform:rotate(8deg)}85%{transform:rotate(-6deg)}}
  #cat-head{transform-origin:294px 350px;animation:catlook 7s ease-in-out infinite}
  @keyframes catlook{0%,80%,100%{transform:rotate(0deg)}86%,92%{transform:rotate(-7deg)}}
  #cat-eyes{transform-origin:294px 348px;animation:blink 4.2s ease-in-out infinite}
  @keyframes blink{0%,91%,100%{transform:scaleY(1)}94%,96%{transform:scaleY(.1)}}

  #frida-tail{transform-origin:142px 380px;animation:wag .45s ease-in-out infinite alternate}
  @keyframes wag{from{transform:rotate(-18deg)}to{transform:rotate(16deg)}}
  #frida-inner{animation:bob 1s ease-in-out infinite alternate}
  @keyframes bob{from{transform:translateY(0)}to{transform:translateY(-3px)}}
  #frida-ear{transform-origin:200px 341px;animation:earflop 2.4s ease-in-out infinite}
  @keyframes earflop{0%,70%,100%{transform:rotate(0deg)}80%{transform:rotate(8deg)}90%{transform:rotate(-4deg)}}

  #person-idle{animation:sway 3.2s ease-in-out infinite alternate;transform-origin:600px 430px}
  @keyframes sway{from{transform:rotate(-1.1deg)}to{transform:rotate(1.1deg)}}

  /* ============ step choreography ============ */
  /* Frida positions per scene */
  #frida{transform:translate(0,0)}
  .stage.s2 #frida{animation:trot2 6.4s ease-in-out forwards}
  @keyframes trot2{
    0%{transform:translate(0,0)}
    9%{transform:translate(45px,-8px)}
    18%{transform:translate(90px,0)}
    27%{transform:translate(135px,-8px)}
    36%{transform:translate(180px,0)}
    45%{transform:translate(215px,-8px)}
    54%,100%{transform:translate(245px,0)}
  }
  .stage.s3 #frida{animation:dart 1.9s cubic-bezier(.3,.1,.3,1) forwards}
  @keyframes dart{
    0%{transform:translate(0,0)}
    30%{transform:translate(130px,-10px)}
    60%{transform:translate(260px,0)}
    80%{transform:translate(360px,-8px)}
    100%{transform:translate(400px,0)}
  }
  .stage.s4 #frida{animation:sidle 1.6s ease .4s forwards;transform:translate(400px,0)}
  @keyframes sidle{from{transform:translate(400px,0)}to{transform:translate(490px,0)}}

  .paw{opacity:0;transform-origin:center;transform:scale(.2)}
  .stage.s2 .paw{animation:pawpop .5s cubic-bezier(.2,1.6,.4,1) forwards}
  .stage.s2 .paw.p1{animation-delay:.8s}
  .stage.s2 .paw.p2{animation-delay:1.5s}
  .stage.s2 .paw.p3{animation-delay:2.2s}
  .stage.s2 .paw.p4{animation-delay:2.9s}
  .stage.s3 .paw{animation:pawpop .3s cubic-bezier(.2,1.6,.4,1) forwards}
  .stage.s3 .paw.p1{animation-delay:.3s}
  .stage.s3 .paw.p2{animation-delay:.7s}
  .stage.s3 .paw.p3{animation-delay:1.1s}
  .stage.s3 .paw.p4{animation-delay:1.5s}
  @keyframes pawpop{to{opacity:1;transform:scale(1)}}

  /* pet label, step 2 */
  #tag-pet{opacity:0;transition:opacity .7s}
  .stage.s2 #tag-pet{opacity:1;transition-delay:3.4s}

  /* walker, step 3 only */
  #walker{opacity:0;transition:opacity .4s}
  .stage.s3 #walker{opacity:1;animation:walkin 3.2s ease-out forwards}
  @keyframes walkin{from{transform:translateX(120px)}to{transform:translateX(0)}}
  .leg{transform-origin:640px 372px}
  .stage.s3 .leg.l1{animation:stride .55s ease-in-out infinite alternate}
  .stage.s3 .leg.l2{animation:stride .55s ease-in-out infinite alternate-reverse}
  @keyframes stride{from{transform:rotate(-14deg)}to{transform:rotate(14deg)}}
  .arm{transform-origin:640px 330px}
  .stage.s3 .arm.a1{animation:swingarm .55s ease-in-out infinite alternate-reverse}
  .stage.s3 .arm.a2{animation:swingarm .55s ease-in-out infinite alternate}
  @keyframes swingarm{from{transform:rotate(-10deg)}to{transform:rotate(10deg)}}
  /* the aware moment: walking stops */
  .stage.s3.aware .leg,.stage.s3.aware .arm{animation:none;transform:rotate(0)}
  .stage.s3.aware #walker{animation:none;transform:translateX(0)}
  #walker-head{transform-origin:640px 300px;transition:transform .6s ease}
  .stage.s3.aware #walker-head{transform:rotate(10deg)} /* looks down at Frida */

  /* person-idle visible in s1, s2, s4 */
  .stage.s3 #person-idle{opacity:0}
  #person-idle{transition:opacity .4s}

  /* speech bubble: pops in s2 and s3, gentle float while visible */
  #bubble{opacity:0;transform:scale(.3);transform-origin:480px 72px}
  .stage.s2 #bubble{animation:bubblepop .55s cubic-bezier(.2,1.5,.4,1) 3.6s forwards,bubblefloat 2.6s ease-in-out 4.2s infinite}
  .stage.s3 #bubble{animation:bubblepop .55s cubic-bezier(.2,1.5,.4,1) 2s forwards,bubblefloat 2.6s ease-in-out 2.6s infinite}
  @keyframes bubblepop{to{opacity:1;transform:scale(1)}}
  @keyframes bubblefloat{0%,100%{transform:scale(1) translateY(0)}50%{transform:scale(1) translateY(-5px)}}

  .note{opacity:0}
  .stage.s2 .note,.stage.s3 .note{animation:floatnote 2s ease-out infinite}
  .stage.s2 .note{animation-delay:4s}
  .stage.s3 .note{animation-delay:2.4s}
  .stage.s2 .note.n2,.stage.s3 .note.n2{animation-delay:4.9s}
  .stage.s3 .note.n2{animation-delay:3.3s}
  @keyframes floatnote{0%{opacity:0;transform:translateY(0)}18%{opacity:1}100%{opacity:0;transform:translateY(-30px)}}

  /* awareness cue + prevented badge, step 3 */
  #aware-ring{opacity:0;transform-origin:640px 300px}
  .stage.s3.aware #aware-ring{animation:awarering 1.6s ease-out 2 forwards}
  @keyframes awarering{0%{opacity:.9;transform:scale(.4)}100%{opacity:0;transform:scale(1.5)}}
  #badge{opacity:0;transform:scale(.3);transform-origin:480px 196px}
  .stage.s3.aware #badge{animation:badgepop .6s cubic-bezier(.2,1.6,.4,1) 1.8s forwards}
  @keyframes badgepop{to{opacity:1;transform:scale(1)}}

  /* step 4: alert channels + heart */
  #alert-line{stroke-dasharray:7 7;stroke-dashoffset:500;opacity:0}
  .stage.s4 #alert-line{opacity:1;animation:dash 1.8s ease-out .6s forwards}
  @keyframes dash{to{stroke-dashoffset:0}}
  #phone,#tag-caregiver{opacity:0;transition:opacity .7s}
  .stage.s4 #phone{opacity:1;transition-delay:1.8s}
  .stage.s4 #tag-caregiver{opacity:1;transition-delay:2.3s}
  #phone{transform-origin:857px 142px}
  .stage.s4 #phone{animation:ringbuzz .18s linear 2.4s 6}
  @keyframes ringbuzz{0%,100%{transform:rotate(0)}30%{transform:rotate(-3deg)}70%{transform:rotate(3deg)}}
  #heart{opacity:0;transform-origin:664px 388px;transform:scale(.2)}
  .stage.s4 #heart{animation:heartpop .7s cubic-bezier(.2,1.6,.4,1) 1.2s forwards,heartbeat 1.6s ease-in-out 2.2s infinite}
  @keyframes heartpop{to{opacity:1;transform:scale(1)}}
  @keyframes heartbeat{0%,100%{transform:scale(1)}12%{transform:scale(1.18)}24%{transform:scale(1)}}
  #alexa-waves path,#sensor-waves path{opacity:0}
  .stage.s2 #sensor-waves path{animation:wavefade 1.5s ease-out 3.8s infinite}
  .stage.s3 #sensor-waves path{animation:wavefade 1.5s ease-out 2.2s infinite}
  .stage.s4 #alexa-waves path{animation:wavefade 1.5s ease-out 1s infinite}
  @keyframes wavefade{0%{opacity:0}30%{opacity:1}100%{opacity:0}}

  @media (prefers-reduced-motion:reduce){
    *{animation:none !important;transition-duration:.01s !important}
    .draw{stroke-dashoffset:0}
    #bubble,#badge,#heart,#phone,#tag-caregiver,#tag-pet,.paw{opacity:1 !important;transform:scale(1) !important}
    #alert-line{opacity:1;stroke-dashoffset:0}
    .stage.s3 #frida{transform:translate(335px,0)}
    .stage.s2 #frida{transform:translate(245px,0)}
    .stage.s3 #walker{opacity:1;transform:translateX(0)}
    .bar.active i{width:100%}
  }
  @media (max-width:560px){
    .step-title{font-size:20px}.step-copy{font-size:13px}
    .caption{min-height:118px}.wordmark{font-size:24px}
  }
</style>
</head>
<body>
<div class="frame">
  <div class="topbar"></div>
  <header>
    <div>
      <div class="wordmark">PALS</div>
      <div class="subname">Pet Awareness for Living Safely</div>
    </div>
    <div class="org">The Gerontechnology Group</div>
  </header>

  <svg id="stage" class="stage s1" viewBox="0 0 960 470" role="img"
       aria-label="Friendly animation: P.A.L.S. maps the room, recognizes Frida the dog, announces her by name so the older adult knows where she is and never trips, and can alert a caregiver if help is ever needed.">

    <path class="draw" d="M60 42 H900" fill="none" stroke="#D8C9AE" stroke-width="2" stroke-linecap="round" pathLength="1"/>
    <path class="draw" d="M60 434 H900" fill="none" stroke="#D8C9AE" stroke-width="2" stroke-linecap="round" pathLength="1"/>

    <!-- sensor -->
    <rect x="456" y="44" width="48" height="20" rx="10" fill="#FFFFFF" stroke="var(--teal)" stroke-width="2.5"/>
    <circle cx="480" cy="54" r="4.5" fill="var(--orange)"/>
    <!-- always-on scan ripples -->
    <g fill="none" stroke="var(--turq)" stroke-width="2.5">
      <path class="ripple r1" d="M300 200 A 230 230 0 0 1 660 200"/>
      <path class="ripple r2" d="M300 200 A 230 230 0 0 1 660 200"/>
      <path class="ripple r3" d="M300 200 A 230 230 0 0 1 660 200"/>
    </g>

    <!-- armchair -->
    <path class="draw" d="M120 430 v-60 q0-14 14-14 h8 q4-40 42-40 h40 q38 0 42 40 h8 q14 0 14 14 v60"
          fill="none" stroke="var(--line)" stroke-width="3" stroke-linecap="round" pathLength="1"/>
    <path class="draw" d="M142 372 q58 -18 116 0" fill="none" stroke="var(--line)" stroke-width="3" stroke-linecap="round" pathLength="1"/>

    <!-- side table + Alexa ring -->
    <path class="draw" d="M742 434 v-64 h96 v64 M742 380 h96" fill="none" stroke="var(--line)" stroke-width="3" stroke-linecap="round" pathLength="1"/>
    <circle class="draw" cx="790" cy="352" r="16" fill="none" stroke="var(--teal)" stroke-width="3" pathLength="1"/>
    <circle cx="790" cy="352" r="6" fill="var(--turq)"/>
    <g id="alexa-waves" fill="none" stroke="var(--turq)" stroke-width="2.5" stroke-linecap="round">
      <path d="M812 344 q8 8 0 16"/>
      <path d="M820 338 q14 14 0 28"/>
    </g>

    <!-- TC the cat on the chair -->
    <g>
      <g id="cat-head">
        <path class="draw" d="M270 366 q-4 -26 10 -34 l-2 -12 10 8 q6 -3 12 0 l10 -8 -2 12 q14 8 10 34 q-2 8 -12 10 h-24 q-10 -2 -12 -10 z"
              fill="none" stroke="var(--line)" stroke-width="3" stroke-linejoin="round" pathLength="1"/>
        <g id="cat-eyes">
          <circle cx="288" cy="348" r="1.8" fill="var(--line)"/>
          <circle cx="300" cy="348" r="1.8" fill="var(--line)"/>
        </g>
      </g>
      <path id="cat-tail" class="draw" d="M300 374 q26 4 24 -22" fill="none" stroke="var(--line)" stroke-width="3" stroke-linecap="round" pathLength="1"/>
    </g>

    <!-- Frida: slim little dog, fluffy head, topknot, snout, four legs -->
    <g id="frida">
      <g id="frida-inner">
        <!-- slim body: back line down to rear haunch and belly -->
        <path class="draw" d="M198 364 Q162 356 148 368 Q138 378 141 394 Q145 406 160 408 L198 408 Q209 406 211 396"
              fill="none" stroke="var(--line)" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" pathLength="1"/>
        <!-- head -->
        <circle class="draw" cx="214" cy="348" r="15" fill="none" stroke="var(--line)" stroke-width="3.2" pathLength="1"/>
        <!-- topknot tuft -->
        <path class="draw" d="M208 334 q2 -9 11 -8 q-5 3 -4 8" fill="none" stroke="var(--line)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" pathLength="1"/>
        <!-- floppy ear -->
        <path id="frida-ear" class="draw" d="M200 341 q-13 5 -10 22 q2 7 8 8" fill="none" stroke="var(--line)" stroke-width="3" stroke-linecap="round" pathLength="1"/>
        <!-- snout + nose -->
        <path class="draw" d="M228 351 q8 1 7 7 q-1 5 -8 4" fill="none" stroke="var(--line)" stroke-width="3" stroke-linecap="round" pathLength="1"/>
        <circle cx="234" cy="353" r="2.2" fill="var(--line)"/>
        <!-- eye -->
        <circle cx="218" cy="345" r="2" fill="var(--line)"/>
        <!-- four slim legs -->
        <path class="draw" d="M162 408 v20 M175 408 v20 M193 408 v20 M203 406 v22" fill="none" stroke="var(--line)" stroke-width="3.2" stroke-linecap="round" pathLength="1"/>
        <!-- curled tail -->
        <path id="frida-tail" class="draw" d="M142 380 q-15 -8 -8 -24 q3 -6 9 -7" fill="none" stroke="var(--line)" stroke-width="3.2" stroke-linecap="round" pathLength="1"/>
      </g>
    </g>

    <!-- paw prints -->
    <g fill="var(--orange)">
      <g class="paw p1"><circle cx="250" cy="424" r="4.5"/><circle cx="243" cy="416" r="2.4"/><circle cx="250" cy="413" r="2.4"/><circle cx="257" cy="416" r="2.4"/></g>
      <g class="paw p2"><circle cx="312" cy="420" r="4.5"/><circle cx="305" cy="412" r="2.4"/><circle cx="312" cy="409" r="2.4"/><circle cx="319" cy="412" r="2.4"/></g>
      <g class="paw p3"><circle cx="372" cy="424" r="4.5"/><circle cx="365" cy="416" r="2.4"/><circle cx="372" cy="413" r="2.4"/><circle cx="379" cy="416" r="2.4"/></g>
      <g class="paw p4"><circle cx="430" cy="420" r="4.5"/><circle cx="423" cy="412" r="2.4"/><circle cx="430" cy="409" r="2.4"/><circle cx="437" cy="412" r="2.4"/></g>
    </g>

    <!-- PET label (step 2) -->
    <g id="tag-pet">
      <rect x="380" y="304" width="58" height="24" rx="12" fill="#FFFFFF" stroke="var(--orange)" stroke-width="2"/>
      <text x="409" y="321" text-anchor="middle" font-family="Nunito,sans-serif" font-size="13" font-weight="900" fill="var(--orange)">PET</text>
    </g>

    <!-- idle person (steps 1, 2, 4) -->
    <g id="person-idle">
      <circle class="draw" cx="600" cy="300" r="15" fill="none" stroke="var(--line)" stroke-width="3.2" pathLength="1"/>
      <path class="draw" d="M600 315 v58 M600 335 q-18 8 -24 26 M600 335 q18 8 24 26 M600 373 q-10 26 -14 56 M600 373 q10 26 14 56"
            fill="none" stroke="var(--line)" stroke-width="3.2" stroke-linecap="round" pathLength="1"/>
    </g>

    <!-- walking person (step 3): limbs animate, stops when aware -->
    <g id="walker">
      <g id="walker-head">
        <circle cx="640" cy="300" r="15" fill="none" stroke="var(--line)" stroke-width="3.2"/>
      </g>
      <path d="M640 315 v57" fill="none" stroke="var(--line)" stroke-width="3.2" stroke-linecap="round"/>
      <path class="arm a1" d="M640 332 q-16 12 -20 30" fill="none" stroke="var(--line)" stroke-width="3.2" stroke-linecap="round"/>
      <path class="arm a2" d="M640 332 q16 12 20 30" fill="none" stroke="var(--line)" stroke-width="3.2" stroke-linecap="round"/>
      <path class="leg l1" d="M640 372 q-12 28 -16 58" fill="none" stroke="var(--line)" stroke-width="3.2" stroke-linecap="round"/>
      <path class="leg l2" d="M640 372 q12 28 16 58" fill="none" stroke="var(--line)" stroke-width="3.2" stroke-linecap="round"/>
    </g>
    <!-- awareness ring around the walker's head -->
    <circle id="aware-ring" cx="640" cy="300" r="26" fill="none" stroke="var(--turq)" stroke-width="3"/>

    <!-- FALL PREVENTED badge -->
    <g id="badge">
      <rect x="386" y="176" width="188" height="40" rx="20" fill="var(--teal)"/>
      <circle cx="412" cy="196" r="11" fill="#FFFFFF"/>
      <path d="M406 196 l4 5 8 -9" fill="none" stroke="var(--teal)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="498" y="202" text-anchor="middle" font-family="Nunito,sans-serif" font-size="15" font-weight="900" fill="#FFFFFF" letter-spacing=".04em">FALL PREVENTED</text>
    </g>

    <!-- speech bubble, hanging from the P.A.L.S. device itself -->
    <g id="bubble">
      <path d="M480 70 L462 94 H354 Q340 94 340 108 V144 Q340 158 354 158 H606 Q620 158 620 144 V108 Q620 94 606 94 H498 Z"
            fill="#FFFFFF" stroke="var(--teal)" stroke-width="2.5"/>
      <text x="480" y="133" text-anchor="middle" font-family="Nunito,sans-serif" font-size="17" font-weight="800" fill="var(--teal)">"Frida has entered the room."</text>
    </g>
    <g class="note" fill="var(--orange)">
      <text x="516" y="84" font-size="16" font-family="Nunito,sans-serif" font-weight="900">&#9834;</text>
    </g>
    <g class="note n2" fill="var(--turq)">
      <text x="534" y="74" font-size="13" font-family="Nunito,sans-serif" font-weight="900">&#9834;</text>
    </g>
    <!-- sound waves from the device when it speaks -->
    <g id="sensor-waves" fill="none" stroke="var(--turq)" stroke-width="2.5" stroke-linecap="round">
      <path d="M512 46 q8 8 0 16"/>
      <path d="M520 40 q14 14 0 28"/>
      <path d="M448 46 q-8 8 0 16"/>
      <path d="M440 40 q-14 14 0 28"/>
    </g>

    <!-- heart between person and Frida (step 4) -->
    <path id="heart" d="M664 384 c-4 -7 -14 -6 -14 2 c0 6 8 10 14 15 c6 -5 14 -9 14 -15 c0 -8 -10 -9 -14 -2 z" fill="var(--orange)"/>

    <!-- caregiver channel (step 4) -->
    <path id="alert-line" d="M502 54 C620 30 760 50 856 106" fill="none" stroke="var(--orange)" stroke-width="3"/>
    <g id="phone">
      <rect x="836" y="106" width="42" height="72" rx="9" fill="#FFFFFF" stroke="var(--orange)" stroke-width="2.5"/>
      <circle cx="857" cy="138" r="10" fill="none" stroke="var(--orange)" stroke-width="2.5"/>
      <path d="M857 132 v6 l5 3" fill="none" stroke="var(--orange)" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="857" cy="166" r="3" fill="#D8C9AE"/>
    </g>
    <g id="tag-caregiver">
      <text x="857" y="198" text-anchor="middle" font-family="Nunito,sans-serif" font-size="12" font-weight="900" fill="var(--teal)" letter-spacing=".04em">FAMILY IN THE LOOP</text>
    </g>
  </svg>

  <div class="caption" id="caption">
    <div class="eyebrow" id="eyebrow">Step 1 of 4</div>
    <div class="step-title" id="title">Sees everything</div>
    <div class="step-copy" id="copy">A small ceiling-mounted sensor maps the room continuously, day and night. It sees shapes and patterns, never a picture.</div>
  </div>

  <div class="progress" id="progress">
    <div class="bar"><i></i></div>
    <div class="bar"><i></i></div>
    <div class="bar"><i></i></div>
    <div class="bar"><i></i></div>
  </div>

  <footer>
    <div class="pills">
      <div class="pill">No camera</div>
      <div class="pill">No cloud</div>
      <div class="pill">Nothing worn</div>
    </div>
    <div class="tagline">P.A.L.S. knows the difference<b>.</b></div>
  </footer>
</div>

<script>
(function(){
  var steps = [
    { cls:"s1", ms:5800, eyebrow:"Step 1 of 4", title:"Sees everything",
      copy:"A small ceiling-mounted sensor maps the room continuously, day and night. It sees shapes and patterns, never a picture.",
      sub:[] },
    { cls:"s2", ms:7600, eyebrow:"Step 2 of 4", title:"Knows the difference",
      copy:"P.A.L.S. tells a pet from a person and greets each pet by name. A pet crossing the room never sets off a false alarm.",
      sub:[] },
    { cls:"s3", ms:9200, eyebrow:"Step 3 of 4", title:"Warns before the fall",
      copy:"Frida darts into the walking path. P.A.L.S. announces her by name, so the older adult knows exactly where she is, pauses, and steps safely. The fall never happens.",
      sub:[ { at:3400, add:"aware" } ] },
    { cls:"s4", ms:7600, eyebrow:"Step 4 of 4", title:"Keeps everyone connected",
      copy:"Family stays in the loop by phone and Alexa announcement. The person stays safe, independent, and together with the pet they love.",
      sub:[] }
  ];

  var stage   = document.getElementById("stage");
  var caption = document.getElementById("caption");
  var eyebrow = document.getElementById("eyebrow");
  var title   = document.getElementById("title");
  var copy    = document.getElementById("copy");
  var bars    = document.getElementById("progress").children;
  var idx = -1;
  var timers = [];

  requestAnimationFrame(function(){
    requestAnimationFrame(function(){ stage.classList.add("drawn"); });
  });

  function clearTimers(){ timers.forEach(clearTimeout); timers = []; }

  function show(i){
    clearTimers();
    idx = i;
    var s = steps[i];
    stage.setAttribute("class","stage drawn " + s.cls);

    // schedule mid-scene beats (e.g. the aware moment in step 3)
    s.sub.forEach(function(ev){
      timers.push(setTimeout(function(){ stage.classList.add(ev.add); }, ev.at));
    });

    caption.classList.add("fading");
    timers.push(setTimeout(function(){
      eyebrow.textContent = s.eyebrow;
      title.textContent   = s.title;
      copy.textContent    = s.copy;
      caption.classList.remove("fading");
    }, 450));

    for (var b = 0; b < bars.length; b++){
      bars[b].className = "bar" + (b < i ? " done" : "");
      bars[b].firstElementChild.style.animationDuration = steps[b].ms + "ms";
    }
    var active = bars[i];
    void active.offsetWidth;
    active.className = "bar active";

    timers.push(setTimeout(next, s.ms));
  }
  function next(){ show((idx + 1) % steps.length); }
  show(0);
})();
</script>
</body>
